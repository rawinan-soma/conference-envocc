name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Quality Gates (lint / typecheck / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile paraglide i18n
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run check
      - name: Build
        run: bun run build
        env:
          # DATABASE_URL must be non-empty for env.ts fail-fast validation during SSR pre-render.
          # This is a build-only placeholder — no real DB connection is made during vite build.
          DATABASE_URL: postgresql://build-placeholder:placeholder@localhost:5432/conference_envocc

  test-unit:
    name: Unit Tests (Vitest server project)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile paraglide i18n
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - name: Run unit tests
        run: bun run test
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM: test@test.local
          SMTP_DISPLAY_NAME: Test

  test-integration:
    name: Integration Tests (Vitest integration project + Postgres)
    runs-on: ubuntu-latest
    needs: test-unit
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile paraglide i18n
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - name: Run migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
      - name: Start dev server (for HTTP-level integration tests)
        # Some integration tests (2.1-INT-001 through 2.1-INT-004) send real HTTP requests
        # to the SvelteKit app at DEV_SERVER_URL. Start the dev server in the background
        # so these tests can connect when activated during Story 2.1 implementation.
        run: bun run dev &
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          # Auth env vars sourced from GH Secrets/Vars — never hardcode credential literals.
          AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.TEST_AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.TEST_AUTHENTIK_CLIENT_SECRET }}
          AUTHENTIK_ISSUER: ${{ vars.TEST_AUTHENTIK_ISSUER }}
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM: test@test.local
          SMTP_DISPLAY_NAME: Test
          # Story 2.2: enable dev bypass route so integration tests can obtain sessions without Authentik
          AUTH_DEV_BYPASS: 'true'
      - name: Wait for dev server to be ready
        run: bunx wait-on http://localhost:3000 --timeout 60000
      - name: Run integration tests
        run: bun run test:integration
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          DEV_SERVER_URL: http://localhost:3000
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM: test@test.local
          SMTP_DISPLAY_NAME: Test
          MAILPIT_URL: http://localhost:8025
          # Story 2.2: the test process reads this for the 2.2-UNIT-001 static assertion
          AUTH_DEV_BYPASS: 'true'

  test-e2e:
    name: E2E Tests (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    # playwright.config.ts uses webServer to start and wait for the dev server automatically.
    # Services are required so the dev server can connect to postgres/mailpit on startup.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile paraglide i18n
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - name: Run migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        # playwright.config.ts webServer config starts 'bun run dev' and waits for it.
        # vite.config.ts sets server.port: 3000 unconditionally; playwright also expects 3000.
        # Do NOT manually start the server here — that causes a port conflict.
        run: bun run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/test_db
          # Auth env vars sourced from GH Secrets/Vars.
          # When secrets are absent (e.g. forks / pre-secret-provisioning), Better Auth logs a
          # warning but the server still starts — E2E tests that require live Authentik are
          # test.skip()-ed and will not fail.
          AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.TEST_AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.TEST_AUTHENTIK_CLIENT_SECRET }}
          AUTHENTIK_ISSUER: ${{ vars.TEST_AUTHENTIK_ISSUER }}
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM: test@test.local
          SMTP_DISPLAY_NAME: Test
          MAILPIT_URL: http://localhost:8025
          # Story 2.2: E2E tests use dev bypass for session setup without Authentik
          AUTH_DEV_BYPASS: 'true'

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build web image
        run: docker build -f Dockerfile . -t conference-envocc-web:${{ github.sha }}
      - name: Build worker image
        run: docker build -f Dockerfile.worker . -t conference-envocc-worker:${{ github.sha }}

  vuln-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Dependency audit
        # --audit-level=high: fail only on high/critical vulnerabilities.
        # Known moderate/low transitive CVEs accepted as false-positives:
        #   GHSA-67mh-4wv8-2f99 (esbuild <=0.24.2 via drizzle-kit/@esbuild-kit/core-utils) —
        #     only affects esbuild's HTTP dev server when exposed to external networks; not
        #     triggered during CI builds or tests.
        #   GHSA-pxg6-pf52-xh8x (cookie <0.7.0 via @sveltejs/kit) — low severity; upstream
        #     @sveltejs/kit@2.65.0 still pins cookie@^0.6.0.
        run: bun audit --audit-level=high
