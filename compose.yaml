services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI at http://localhost:8025

volumes:
  pgdata:
  # Named volume for room photo uploads — persists across container restarts (R-005).
  # In production (docker-compose.prod.yml), the web service mounts this volume at
  # UPLOAD_DIR: /app/uploads
  uploads:
