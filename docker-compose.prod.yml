services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Room photo upload volume path (Story 3.2 AC-6 / R-005)
      # Resolved exclusively from this env var — no hardcoded paths (12-factor).
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "bunx drizzle-kit migrate && bun run build/index.js"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun --eval "const r = await fetch(''http://localhost:3000/''); process.exit(r.ok ? 0 : 1)"'
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  # Named volume for room photo uploads — persists across container restarts (R-005).
  uploads:
